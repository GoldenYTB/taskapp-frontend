<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Earn</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://sad.adsgram.ai/js/sad.min.js"></script>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #0f1525;
    --card: rgba(255,255,255,.04);
    --stroke: rgba(255,255,255,.08);
    --text: #eef2fb;
    --muted: #8a93a8;
    --accent: #2ea6ff;       /* TON blue */
    --accent2: #36d1dc;
    --good: #3ddc97;
    --bad: #ff6b6b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "SF Pro Display", ui-sans-serif, system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #16203a 0%, var(--bg) 55%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px calc(40px + env(safe-area-inset-bottom));
    max-width: 480px; margin: 0 auto;
  }
  .head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .head .hi { font-size: 14px; color: var(--muted); }
  .head .hi b { color: var(--text); font-weight: 600; }
  .badge {
    font-size: 11px; font-weight: 600; color: var(--accent);
    border: 1px solid var(--stroke); border-radius: 999px; padding: 6px 12px;
    background: rgba(46,166,255,.08);
  }

  /* Balance — the hero */
  .hero {
    position: relative; border-radius: 24px; padding: 28px 24px;
    background: linear-gradient(135deg, rgba(46,166,255,.16), rgba(54,209,220,.06));
    border: 1px solid var(--stroke); overflow: hidden;
    box-shadow: 0 20px 50px -20px rgba(46,166,255,.5);
  }
  .hero::after {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(60% 120% at 80% 0%, rgba(54,209,220,.25), transparent 60%);
    pointer-events: none;
  }
  .hero .label { font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); }
  .hero .amount {
    font-size: 52px; font-weight: 800; line-height: 1.05; margin-top: 6px;
    letter-spacing: -.03em; font-variant-numeric: tabular-nums;
    background: linear-gradient(90deg, #fff, #bfe4ff);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .hero .amount .cur { font-size: 26px; vertical-align: top; -webkit-text-fill-color: var(--accent2); }
  .hero .earned { font-size: 13px; color: var(--muted); margin-top: 10px; }
  .hero .earned b { color: var(--good); font-weight: 600; }

  .section-title { font-size: 13px; color: var(--muted); margin: 28px 4px 12px; font-weight: 500; }

  .card {
    border: 1px solid var(--stroke); border-radius: 18px;
    background: var(--card); backdrop-filter: blur(12px); padding: 18px;
  }

  /* Watch-to-earn */
  .earn-card { display: flex; align-items: center; gap: 16px; }
  .earn-icon {
    width: 52px; height: 52px; border-radius: 15px; flex: none; display: grid; place-items: center;
    font-size: 24px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 8px 20px -6px rgba(46,166,255,.6);
  }
  .earn-card .t { font-size: 16px; font-weight: 600; }
  .earn-card .d { font-size: 13px; color: var(--muted); margin-top: 2px; }

  .btn {
    width: 100%; border: none; border-radius: 15px; font-size: 16px; font-weight: 700;
    padding: 16px; cursor: pointer; color: #04111f;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 12px 30px -10px rgba(46,166,255,.7);
    transition: transform .1s, box-shadow .1s; margin-top: 14px;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 6px 16px -8px rgba(46,166,255,.7); }
  .btn:disabled { opacity: .55; box-shadow: none; }
  .btn.ghost {
    background: var(--card); color: var(--text); border: 1px solid var(--stroke); box-shadow: none;
  }

  .coin-row { display: flex; gap: 10px; margin-bottom: 12px; }
  .coin {
    flex: 1; border: 1px solid var(--stroke); border-radius: 14px; padding: 14px 10px;
    background: var(--card); color: var(--text); cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 10px;
  }
  .coin.selected { border-color: var(--accent); background: rgba(46,166,255,.1); }
  .coin .ic { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center;
    background: linear-gradient(135deg,#26a17b,#1f8e6a); font-size: 13px; font-weight: 800; color:#fff; }
  .coin .nm { font-size: 14px; font-weight: 600; }
  .coin .net { font-size: 11px; color: var(--muted); }

  input {
    width: 100%; border: 1px solid var(--stroke); border-radius: 14px; padding: 15px;
    font-size: 15px; background: var(--bg2); color: var(--text); margin-bottom: 6px;
  }
  input::placeholder { color: #5b6478; }
  input:focus { outline: none; border-color: var(--accent); }

  .note { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.5; }
  .msg { font-size: 13px; margin-top: 12px; font-weight: 600; min-height: 18px; }
  .msg.ok { color: var(--good); } .msg.err { color: var(--bad); }
</style>
</head>
<body>
  <div class="head">
    <div class="hi">Hey <b id="name">there</b> 👋</div>
    <div class="badge">● TON Network</div>
  </div>

  <div class="hero">
    <div class="label">Available balance</div>
    <div class="amount"><span class="cur">$</span><span id="bal">0.00</span></div>
    <div class="earned">Lifetime earned <b>$<span id="earned">0.00</span></b></div>
  </div>

  <div class="section-title">Earn rewards</div>
  <div class="card earn-card">
    <div class="earn-icon">📺</div>
    <div>
      <div class="t">Watch &amp; earn</div>
      <div class="d">Watch a short ad, get paid instantly</div>
    </div>
  </div>
  <button class="btn" id="watch">Watch ad to earn</button>
  <div class="msg" id="admsg"></div>

  <div class="section-title">Withdraw to wallet</div>
  <div class="card">
    <div class="coin-row" id="coins">
      <button class="coin selected" data-c="USDT">
        <span class="ic">₮</span>
        <span><span class="nm">USDT</span><br><span class="net">TON network</span></span>
      </button>
    </div>
    <input id="addr" placeholder="Your TON wallet address" />
    <button class="btn ghost" id="wd">Request withdrawal</button>
    <div class="note">Minimum $<span id="min">1.00</span> · USDT on the TON blockchain. Reviewed manually within 48h — if not approved in time, the amount returns to your balance.</div>
    <div class="msg" id="msg"></div>
  </div>

<script>
const API = "https://taskapp-backend-895v.onrender.com"; // <-- set to your deployed backend
const tg = window.Telegram?.WebApp;
tg?.ready(); tg?.expand();
try { tg?.setHeaderColor?.("#0a0e1a"); tg?.setBackgroundColor?.("#0a0e1a"); } catch(e){}

const params = new URLSearchParams(location.search);
const ref = params.get("ref");
const user = tg?.initDataUnsafe?.user;
const uid = user?.id || 0;
if (user?.first_name) document.getElementById("name").textContent = user.first_name;

const ADSGRAM_BLOCK_ID = "YOUR_BLOCK_ID";
const AdController = window.Adsgram?.init({ blockId: ADSGRAM_BLOCK_ID });

document.getElementById("watch").onclick = async () => {
  setAdMsg("Loading ad…", "");
  try {
    await AdController.show();
    setAdMsg("Reward added! Refreshing…", "ok");
    setTimeout(load, 1500);
  } catch (e) {
    setAdMsg("Ad skipped or unavailable. Try again.", "err");
  }
};
function setAdMsg(t, kind) { const m = document.getElementById("admsg"); m.textContent = t; m.className = "msg " + (kind||""); }

async function load() {
  if (!uid) { setMsg("Open this inside Telegram.", "err"); return; }
  try {
    const r = await fetch(API + "/api/user", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ telegram_id: uid, username: user?.username, referred_by: ref }),
    });
    const d = await r.json();
    document.getElementById("bal").textContent = d.balance_usd.toFixed(2);
    document.getElementById("earned").textContent = d.total_earned.toFixed(2);
    document.getElementById("min").textContent = d.min_withdrawal.toFixed(2);
  } catch (e) { setMsg("Could not load your wallet. Try again.", "err"); }
}
function setMsg(t, kind) { const m = document.getElementById("msg"); m.textContent = t; m.className = "msg " + (kind||""); }

const selectedCoin = "USDT"; // USDT on TON only

document.getElementById("wd").onclick = async () => {
  const address = document.getElementById("addr").value.trim();
  if (!address) { setMsg("Enter your TON wallet address first.", "err"); return; }
  try {
    const r = await fetch(API + "/api/withdraw", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ telegram_id: uid, address, currency: selectedCoin }),
    });
    const d = await r.json();
    if (d.error) setMsg(d.error, "err");
    else { setMsg(`Queued $${d.amount_usd.toFixed(2)} USDT. Reviewed within 48h.`, "ok"); load(); }
  } catch (e) { setMsg("Request failed. Try again.", "err"); }
};

load();
</script>
</body>
</html>
